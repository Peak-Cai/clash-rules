ruleset=DIRECT,[]GEOIP,CN,no-resolve
ruleset=🚀 节点选择,[]FINAL

custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]🔯 故障转移`[]🔮 负载均衡`[]🚀 手动切换`[]DIRECT
custom_proxy_group=🚀 手动切换`select`[]🚁 vmess+ws`[]✈️ vless+vision`[]✈️ vless+vision+reality`[]🚁 Zero Trust`[]🛩️ WARP-1`[]🛩️ WARP-2`[]🛩️ WARP-3
custom_proxy_group=♻️ 自动选择`url-test`[]🚁 vmess+ws`[]✈️ vless+vision`[]✈️ vless+vision+reality`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🔯 故障转移`fallback`[]🚁 vmess+ws`[]✈️ vless+vision`[]✈️ vless+vision+reality`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🔮 负载均衡`load-balance`[]🚁 vmess+ws`[]✈️ vless+vision`[]✈️ vless+vision+reality`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🌏 国内媒体`select`[]DIRECT`[]🚀 手动切换
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 节点选择`[]♻️ 自动选择
custom_proxy_group=🛑 广告拦截`select`[]REJECT`[]DIRECT
custom_proxy_group=🍃 应用净化`select`[]REJECT`[]DIRECT
custom_proxy_group=🆎 AdBlock`select`[]REJECT`[]DIRECT
custom_proxy_group=🛡️ 隐私防护`select`[]REJECT`[]DIRECT

enable_rule_generator=true
overwrite_original_rules=true

